<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px;
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <h1>Flask Notes App</h1>

    <form action="/add" method="POST">
        <input type="text" name="note" placeholder="Write note">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for note in notes %}
        <li>
            {{ note }}
            <a href="/delete/{{ loop.index0 }}">Delete</a>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
